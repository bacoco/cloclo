<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CLOco — Design</title>
  <style>
    :root {
      --bg-primary: #1a1a2e;
      --bg-secondary: #16213e;
      --bg-tertiary: #0f3460;
      --text-primary: #e6e6e6;
      --text-secondary: #a0a0b0;
      --accent: #e94560;
      --accent-hover: #ff6b81;
      --success: #4ecca3;
      --warning: #f0a500;
      --border: #2a2a4a;
      --card-bg: #1e1e3a;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg-primary: #f5f5f5;
        --bg-secondary: #ffffff;
        --bg-tertiary: #e8e8e8;
        --text-primary: #1a1a2e;
        --text-secondary: #555566;
        --accent: #e94560;
        --accent-hover: #c73e55;
        --success: #2d9d78;
        --warning: #c08800;
        --border: #d0d0d0;
        --card-bg: #ffffff;
      }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 24px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
    }
    .header h1 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-secondary);
    }
    .header h1 span { color: var(--accent); }
    .status {
      font-size: 12px;
      color: var(--success);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status::before {
      content: '';
      width: 8px;
      height: 8px;
      background: var(--success);
      border-radius: 50%;
    }
    .main {
      flex: 1;
      padding: 32px;
      overflow-y: auto;
    }
    #claude-content { max-width: 900px; margin: 0 auto; }
    h2 { font-size: 24px; margin-bottom: 8px; }
    h3 { font-size: 18px; margin: 16px 0 8px; color: var(--text-secondary); }
    .subtitle { color: var(--text-secondary); margin-bottom: 24px; }
    .label { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary); margin-bottom: 8px; }
    .options { display: flex; flex-direction: column; gap: 12px; margin: 16px 0; }
    .option {
      padding: 16px 20px;
      background: var(--card-bg);
      border: 2px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
      padding-left: 52px;
    }
    .option::before {
      content: attr(data-choice);
      position: absolute;
      left: 16px;
      top: 16px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--bg-tertiary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: bold;
      text-transform: uppercase;
    }
    .option:hover { border-color: var(--accent); }
    .option.selected { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 10%, var(--card-bg)); }
    .option.selected::before { background: var(--accent); color: white; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; margin: 16px 0; }
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
    }
    .mockup {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin: 12px 0;
    }
    .mockup-header { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
    .split { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    @media (max-width: 700px) { .split { grid-template-columns: 1fr; } }
    .pros-cons { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .pros-cons ul { padding-left: 20px; }
    .pros-cons .pros { color: var(--success); }
    .pros-cons .cons { color: var(--warning); }
    .placeholder { background: var(--bg-tertiary); border-radius: 6px; padding: 12px; text-align: center; color: var(--text-secondary); font-style: italic; }
    .indicator {
      padding: 12px 24px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 13px;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <div class="header">
    <h1><span>CLOco</span> — Design</h1>
    <div class="status">Connected</div>
  </div>

  <div class="main">
    <div id="claude-content">
    </div>
  </div>

  <div class="indicator">
    <span id="indicator-text">Click an option to select</span>
  </div>
</body>
</html>
